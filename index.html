<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jalwa Game | Home</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="top-bar">
        <span>Balance: ₹<span id="balance">100.00</span></span>
        <button onclick="location.href='signup.html'" class="recharge-btn">Recharge</button>
    </div>

    <div class="game-container">
        <div class="timer-section">
            <p>Count Down</p>
            <h2 id="countdown">00:30</h2>
        </div>

        <div class="button-row">
            <button class="g-btn" onclick="bet('Green')">Join Green</button>
            <button class="v-btn" onclick="bet('Violet')">Join Violet</button>
            <button class="r-btn" onclick="bet('Red')">Join Red</button>
        </div>
    </div>

    <div class="record-table">
        <h3>Game Record</h3>
        <div id="history" class="history-grid"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
