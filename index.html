<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prediction Game</title>
    <style>
        body { font-family: Arial, sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 0; }
        .header { background: #ffcc00; color: black; padding: 15px; font-size: 24px; }
        .balance { font-size: 20px; margin: 10px; color: #4caf50; }
        .btn-group { margin: 20px; }
        .btn { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .green { background: #22c55e; color: black; }
        .red { background: #ef4444; color: black; }
        .violet { background: #a855f7; color: black; }
        .result { margin: 20px; font-size: 22px; }
    </style>
</head>
<body>

    <div class="header">🔥 Prediction Game</div>
    <div class="balance">Balance: ₹ <span id="balance">100</span></div>
    
    <div class="btn-group">
        <button class="btn green" onclick="placeBet('GREEN')">Green</button>
        <button class="btn violet" onclick="placeBet('VIOLET')">Violet</button>
        <button class="btn red" onclick="placeBet('RED')">Red</button>
    </div>
    
    <div class="result" id="result">Place your bet!</div>
    
    <script>
        let balance = 100;
        function placeBet(choice) {
            if (balance < 10) {
                alert("बैलेंस कम है! ₹10 से कम नहीं हो सकता।");
                return;
            }
            balance -= 10;
            document.getElementById('balance').innerText = balance;
            
            let result = Math.floor(Math.random() * 3); // 0, 1, 2
            setTimeout(() => {
                if ((result === 0 && choice === 'GREEN') ||
                    (result === 1 && choice === 'VIOLET') ||
                    (result === 2 && choice === 'RED')) {
                    balance += 20;
                    document.getElementById('result').innerText = "आप जीते! " + choice;
                } else {
                    document.getElementById('result').innerText = "आप हार गए! " + choice;
                }
                document.getElementById('balance').innerText = balance;
            }, 1000);
        }
    </script>
</body>
</html>
