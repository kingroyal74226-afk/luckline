<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Goal Win</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body { background: #0a0a0f; color: white; font-family: system-ui; }
    
    .ball {
      width: 56px; height: 56px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; font-weight: 700; color: white;
      border: 4px solid rgba(255,255,255,0.3);
      box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    }
    .green-ball { background: linear-gradient(135deg, #22c55e, #15803d); }
    .red-ball { background: linear-gradient(135deg, #ef4444, #b91c1c); }
    .violet-ball { background: linear-gradient(135deg, #a855f7, #6b21a8); }

    .color-btn { height: 52px; border-radius: 12px; font-weight: 700; font-size: 17px; }
  </style>
</head>
<body class="pb-28">

  <!-- Header -->
  <header class="bg-[#111118] py-4 px-4 flex justify-between items-center border-b border-zinc-800">
    <div class="text-2xl font-bold">GOAL <span class="text-emerald-400">WIN</span></div>
    <div onclick="showWallet()" class="flex items-center gap-2 bg-zinc-900 px-5 py-2 rounded-2xl cursor-pointer">
      <span class="text-emerald-400">₹</span>
      <span id="balance" class="font-bold">2.31</span>
    </div>
  </header>

  <!-- Game Modes -->
  <div class="px-4 py-4 flex gap-3 overflow-x-auto bg-[#16161f]">
    <div class="bg-gradient-to-r from-cyan-400 to-emerald-500 text-black font-bold px-7 py-3 rounded-3xl whitespace-nowrap">WinGo 30sec</div>
    <div class="bg-zinc-800 px-7 py-3 rounded-3xl whitespace-nowrap">WinGo 1 Min</div>
    <div class="bg-zinc-800 px-7 py-3 rounded-3xl whitespace-nowrap">WinGo 3 Min</div>
    <div class="bg-zinc-800 px-7 py-3 rounded-3xl whitespace-nowrap">WinGo 5 Min</div>
  </div>

  <!-- How to Play + Timer -->
  <div class="mx-4 mt-4 bg-gradient-to-r from-teal-900 to-cyan-900 rounded-3xl p-5 flex items-center justify-between">
    <div>
      <div class="flex items-center gap-2 text-sm">
        <span>How to play</span>
      </div>
      <div class="text-xs text-zinc-300">WinGo 30sec</div>
    </div>
    <div class="text-right">
      <div class="text-xs text-zinc-300">Time remaining</div>
      <div id="timer" class="text-5xl font-mono font-bold text-white">00:21</div>
      <div id="period" class="text-[10px] text-zinc-400">20260326100052068</div>
    </div>
  </div>

  <!-- Main Game Area -->
  <div class="mx-4 mt-6 bg-[#16161f] rounded-3xl p-6">
    <!-- Color Buttons -->
    <div class="grid grid-cols-3 gap-3 mb-6">
      <button onclick="openBetPanel('Green')" class="color-btn bg-emerald-600">Green</button>
      <button onclick="openBetPanel('Violet')" class="color-btn bg-violet-600">Violet</button>
      <button onclick="openBetPanel('Red')" class="color-btn bg-red-600">Red</button>
    </div>

    <!-- Number Balls -->
    <div id="ballsContainer" class="grid grid-cols-5 gap-4 mb-8"></div>

    <!-- Multipliers + Big/Small -->
    <div class="flex flex-wrap gap-2 mb-6">
      <button onclick="openBetPanel('Random')" class="px-6 py-2 bg-zinc-700 rounded-2xl text-sm">Random</button>
      <button onclick="openBetPanel('X1')" class="px-6 py-2 bg-emerald-500 rounded-2xl text-sm">X1</button>
      <button onclick="openBetPanel('X5')" class="px-6 py-2 bg-zinc-700 rounded-2xl text-sm">X5</button>
      <button onclick="openBetPanel('X10')" class="px-6 py-2 bg-zinc-700 rounded-2xl text-sm">X10</button>
    </div>

    <div class="grid grid-cols-2 gap-3">
      <button onclick="openBetPanel('Big')" class="py-4 bg-gradient-to-r from-amber-500 to-orange-500 rounded-2xl font-bold text-lg">Big</button>
      <button onclick="openBetPanel('Small')" class="py-4 bg-gradient-to-r from-blue-500 to-cyan-500 rounded-2xl font-bold text-lg">Small</button>
    </div>
  </div>

  <!-- My History Section -->
  <div class="mx-4 mt-8">
    <div class="flex gap-2 mb-3">
      <button class="flex-1 py-3 bg-zinc-800 rounded-2xl font-medium">Game history</button>
      <button class="flex-1 py-3 bg-zinc-800 rounded-2xl font-medium">Chart</button>
      <button class="flex-1 py-3 bg-emerald-600 rounded-2xl font-medium">My history</button>
    </div>

    <div id="myHistory" class="space-y-3">
      <!-- JS se dynamically add hoga -->
    </div>
  </div>

  <!-- Bet Panel -->
  <div id="betPanel" class="hidden fixed bottom-0 left-0 right-0 bg-[#0f0f17] border-t-4 border-cyan-400 rounded-t-3xl p-6 z-50">
    <div class="text-center mb-6">
      <div id="betTypeDisplay" class="text-emerald-400 font-bold text-xl">Select Small</div>
      <div class="text-xs text-zinc-400">WinGo 30sec</div>
    </div>

    <div class="mb-6">
      <div class="text-sm mb-2">Balance</div>
      <div class="flex gap-2">
        <button onclick="setAmount(1)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">1</button>
        <button onclick="setAmount(10)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">10</button>
        <button onclick="setAmount(100)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">100</button>
        <button onclick="setAmount(1000)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">1000</button>
      </div>
    </div>

    <div class="flex justify-between items-center mb-6">
      <div>Quantity</div>
      <div class="flex items-center gap-6 bg-zinc-800 px-8 py-3 rounded-3xl">
        <button onclick="changeQty(-1)" class="text-2xl">-</button>
        <span id="qty" class="text-2xl font-bold w-10 text-center">1</span>
        <button onclick="changeQty(1)" class="text-2xl">+</button>
      </div>
    </div>

    <div class="flex gap-2 mb-8 flex-wrap">
      <button onclick="setMult(1)" class="flex-1 py-3 bg-emerald-500 rounded-2xl text-sm">X1</button>
      <button onclick="setMult(5)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">X5</button>
      <button onclick="setMult(10)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">X10</button>
      <button onclick="setMult(20)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">X20</button>
      <button onclick="setMult(50)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">X50</button>
      <button onclick="setMult(100)" class="flex-1 py-3 bg-zinc-700 rounded-2xl text-sm">X100</button>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <button onclick="closeBetPanel()" class="py-4 bg-zinc-700 rounded-2xl font-bold">Cancel</button>
      <button onclick="placeBet()" class="py-4 bg-emerald-600 rounded-2xl font-bold">Confirm</button>
    </div>

    <div class="text-center mt-6">
      Total amount <span id="total" class="font-bold text-emerald-400">₹1.00</span>
    </div>
  </div>

  <!-- Bottom Nav -->
  <nav class="fixed bottom-0 left-0 right-0 bg-[#111118] py-4 border-t border-zinc-800">
    <div class="grid grid-cols-4 text-center text-xs">
      <div class="text-zinc-400">Promotion</div>
      <div class="text-zinc-400">Activity</div>
      <div class="text-emerald-400">Home</div>
      <div class="text-zinc-400">Wallet</div>
    </div>
  </nav>

  <script>
    let balance = 2.31;
    let currentBetType = "";
    let qty = 1;
    let mult = 1;

    function createBalls() {
      const cont = document.getElementById('ballsContainer');
      cont.innerHTML = '';
      const cls = ['violet-ball','green-ball','red-ball','green-ball','red-ball','violet-ball','green-ball','red-ball','green-ball','red-ball'];
      for(let i=0; i<=9; i++){
        const d = document.createElement('div');
        d.className = `ball ${cls[i]}`;
        d.textContent = i;
        d.onclick = () => openBetPanel(i.toString());
        cont.appendChild(d);
      }
    }

    function updateBalance(){
      document.getElementById('balance').textContent = balance.toFixed(2);
    }

    function startTimer(){
      let t = 30;
      const el = document.getElementById('timer');
      setInterval(() => {
        t--;
        el.textContent = `00:\( {t<10?'0':''} \){t}`;
        if(t<=0) t=30;
      },1000);
    }

    function openBetPanel(type){
      currentBetType = type;
      document.getElementById('betTypeDisplay').textContent = `Select ${type}`;
      document.getElementById('betPanel').classList.remove('hidden');
      updateTotal();
    }

    function closeBetPanel(){
      document.getElementById('betPanel').classList.add('hidden');
    }

    function changeQty(n){
      qty = Math.max(1, qty + n);
      document.getElementById('qty').textContent = qty;
      updateTotal();
    }

    function setAmount(a){
      qty = a;
      document.getElementById('qty').textContent = qty;
      updateTotal();
    }

    function setMult(m){
      mult = m;
      updateTotal();
    }

    function updateTotal(){
      const total = (qty * mult).toFixed(2);
      document.getElementById('total').textContent = `₹${total}`;
    }

    function placeBet(){
      const total = qty * mult;
      if(balance < total){
        alert("Balance insufficient!");
        return;
      }
      balance -= total;
      updateBalance();
      closeBetPanel();

      // Add to My History
      addToMyHistory(currentBetType, total);

      alert(`Bet Successful on \( {currentBetType}!\nAmount: ₹ \){total}`);
    }

    function addToMyHistory(type, amount){
      const container = document.getElementById('myHistory');
      const div = document.createElement('div');
      div.className = "bg-[#1a1a24] rounded-2xl p-4 flex justify-between items-center";
      div.innerHTML = `
        <div>
          <div class="flex items-center gap-3">
            <span class="bg-blue-600 px-3 py-1 rounded-xl text-xs">${type}</span>
            <span class="text-xs text-zinc-400">20260326100052065</span>
          </div>
          <div class="text-xs text-zinc-500 mt-1">2026-03-26 22:42:07</div>
        </div>
        <div class="text-right">
          <div class="bg-emerald-600 text-xs px-4 py-1 rounded-2xl inline-block">Succeed</div>
          <div class="text-emerald-400 font-bold mt-1">+₹${(amount*1.2).toFixed(2)}</div>
        </div>
      `;
      container.prepend(div);
    }

    function showWallet(){
      alert(`Wallet Balance: ₹${balance.toFixed(2)}`);
    }

    window.onload = () => {
      createBalls();
      updateBalance();
      startTimer();

      // Demo history
      addToMyHistory("Small", 1);
      addToMyHistory("Green", 10);
    };
  </script>
</body>
  </html>
