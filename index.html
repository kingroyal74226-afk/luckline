<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Prediction - Win Big!</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .color-box {
      transition: all 0.4s ease;
    }
    .result {
      animation: pop 0.6s ease;
    }
    @keyframes pop {
      0% { transform: scale(0.5); }
      100% { transform: scale(1); }
    }
  </style>
</head>
<body class="bg-gradient-to-br from-purple-900 to-black text-white min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full bg-zinc-900 rounded-3xl shadow-2xl p-6">
    <h1 class="text-4xl font-bold text-center mb-2">🎨 Color Prediction</h1>
    <p class="text-center text-emerald-400 text-sm mb-6">Predict & Win Real Time</p>

    <!-- Balance -->
    <div class="bg-zinc-800 rounded-2xl p-4 flex justify-between items-center mb-6">
      <div>
        <p class="text-xs text-zinc-400">Your Balance</p>
        <p id="balance" class="text-3xl font-bold text-emerald-400">₹ 5000</p>
      </div>
      <button onclick="addMoney()" class="bg-emerald-500 hover:bg-emerald-600 px-6 py-2 rounded-xl font-medium">
        + Add Money
      </button>
    </div>

    <!-- Bet Amount -->
    <div class="mb-6">
      <label class="block text-sm text-zinc-400 mb-2">Bet Amount (₹)</label>
      <input id="bet" type="number" value="100" 
             class="w-full bg-zinc-800 text-3xl font-bold text-center py-4 rounded-2xl focus:outline-none">
    </div>

    <!-- Color Options -->
    <div class="grid grid-cols-3 gap-4 mb-8">
      <button onclick="selectColor('red')" 
              class="color-box bg-red-500 hover:bg-red-600 h-28 rounded-3xl text-2xl font-bold shadow-lg">🔴 RED</button>
      <button onclick="selectColor('green')" 
              class="color-box bg-emerald-500 hover:bg-emerald-600 h-28 rounded-3xl text-2xl font-bold shadow-lg">🟢 GREEN</button>
      <button onclick="selectColor('violet')" 
              class="color-box bg-violet-500 hover:bg-violet-600 h-28 rounded-3xl text-2xl font-bold shadow-lg">🟣 VIOLET</button>
    </div>

    <!-- Selected Color -->
    <div id="selected" class="text-center text-xl font-medium mb-4 h-8"></div>

    <!-- Play Button -->
    <button onclick="playGame()" 
            id="playBtn"
            class="w-full bg-gradient-to-r from-pink-500 to-purple-500 hover:from-pink-600 hover:to-purple-600 py-6 text-2xl font-bold rounded-3xl transition-all">
      PLAY NOW
    </button>

    <!-- Result Area -->
    <div id="resultArea" class="hidden mt-6 text-center">
      <p class="text-sm text-zinc-400 mb-2">Result in <span id="countdown" class="text-4xl font-bold text-white">10</span>s</p>
      <div id="result" class="result text-6xl font-black py-6 rounded-3xl"></div>
      <p id="winMsg" class="text-2xl font-bold mt-4"></p>
    </div>
  </div>

  <script>
    let balance = 5000;
    let selectedColor = null;
    let betAmount = 100;

    function selectColor(color) {
      selectedColor = color;
      document.getElementById('selected').innerHTML = 
        `Selected: <span class="text-3xl">${color === 'red' ? '🔴 RED' : color === 'green' ? '🟢 GREEN' : '🟣 VIOLET'}</span>`;
    }

    function playGame() {
      betAmount = parseInt(document.getElementById('bet').value) || 100;
      if (!selectedColor) {
        alert("Please select a color first! 🔥");
        return;
      }
      if (betAmount > balance) {
        alert("Balance kam hai bhai!");
        return;
      }

      document.getElementById('playBtn').disabled = true;
      document.getElementById('resultArea').classList.remove('hidden');
      let time = 10;
      const countdownEl = document.getElementById('countdown');

      const timer = setInterval(() => {
        time--;
        countdownEl.textContent = time;
        if (time <= 0) {
          clearInterval(timer);
          showResult();
        }
      }, 1000);
    }

    function showResult() {
      const colors = ['red', 'green', 'violet'];
      const randomColor = colors[Math.floor(Math.random() * colors.length)];
      
      const resultEl = document.getElementById('result');
      resultEl.innerHTML = randomColor === 'red' ? '🔴 RED' : 
                          randomColor === 'green' ? '🟢 GREEN' : '🟣 VIOLET';
      resultEl.style.backgroundColor = randomColor === 'red' ? '#ef4444' : 
                                     randomColor === 'green' ? '#10b981' : '#8b5cf6';

      if (randomColor === selectedColor) {
        balance += betAmount * 2; // 2x payout
        document.getElementById('winMsg').innerHTML = `🎉 WIN +₹${betAmount*2}`;
        document.getElementById('winMsg').className = "text-2xl font-bold mt-4 text-emerald-400";
      } else {
        balance -= betAmount;
        document.getElementById('winMsg').innerHTML = `😢 LOSS -₹${betAmount}`;
        document.getElementById('winMsg').className = "text-2xl font-bold mt-4 text-red-400";
      }

      document.getElementById('balance').textContent = `₹ ${balance}`;
      
      // Reset for next round
      setTimeout(() => {
        document.getElementById('playBtn').disabled = false;
        selectedColor = null;
        document.getElementById('selected').innerHTML = '';
        document.getElementById('resultArea').classList.add('hidden');
      }, 3000);
    }

    function addMoney() {
      balance += 1000;
      document.getElementById('balance').textContent = `₹ ${balance}`;
      alert("₹1000 added (Demo mode)");
    }
  </script>
</body>
</html>
